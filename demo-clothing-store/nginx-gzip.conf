# ─────────────────────────────────────────────────────────────
# Add this block inside your nginx.conf http {} section
# Usually located at: /etc/nginx/nginx.conf  OR
#                     /etc/nginx/sites-available/alariya
# ─────────────────────────────────────────────────────────────

# Gzip compression — reduces JSON responses from 2.9 MB → ~250 KB
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
    application/json
    application/javascript
    text/css
    text/plain
    text/xml
    application/xml
    image/svg+xml;

# Keep connections alive — avoids 0.37s TLS re-handshake per request
keepalive_timeout 65;
keepalive_requests 100;
